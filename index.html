<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyAgent MAX — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body { background: #030712; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @media (max-width: 600px) {
      .q-date   { display: none !important; }
      .q-status { display: none !important; }
      .q-dot    { display: none !important; }
      main { padding: 1rem !important; }
    }
  </style>
</head>
<body class="text-white min-h-screen">
<main class="max-w-7xl mx-auto p-6 space-y-8">

  <!-- Header -->
  <div class="flex items-center justify-between flex-wrap gap-3">
    <div class="flex items-center gap-3">
      <span class="w-3 h-3 rounded-full bg-red-500 pulse"></span>
      <h1 class="text-2xl font-bold tracking-tight">MoneyAgent MAX</h1>
    </div>
    <div id="hdr" class="flex gap-6 text-sm text-gray-400"></div>
  </div>

  <!-- Status Bar -->
  <div id="status" class="rounded-xl p-4 grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-4 text-sm" style="background:#111827"></div>

  <!-- Monetização -->
  <section id="monetization"></section>

  <!-- Published -->
  <section id="published"></section>

  <!-- Top 3 -->
  <section id="top3"></section>

  <!-- Best Hour -->
  <section>
    <h2 class="text-lg font-semibold mb-3 text-gray-300">⏰ Análise de Hora de Publicação</h2>
    <div class="rounded-xl p-4" style="background:#111827">
      <div class="flex items-start justify-between mb-4">
        <div>
          <p class="text-sm font-medium text-gray-400">Melhor hora para publicar (UTC)</p>
          <p class="text-xs text-gray-600">Média de views por hora de upload</p>
        </div>
        <div id="hour-badge" class="text-right"></div>
      </div>
      <canvas id="hour-chart"></canvas>
      <div id="hour-ph" class="text-center text-gray-600 text-sm py-8"></div>
    </div>
  </section>

  <!-- Views + Subscribers History -->
  <section>
    <h2 class="text-lg font-semibold mb-3 text-gray-300">📈 Views & Subscribers ao Longo do Tempo</h2>
    <div class="rounded-xl p-4" style="background:#111827">
      <canvas id="hist-chart"></canvas>
      <div id="hist-ph" class="text-center text-gray-600 text-sm py-8"></div>
    </div>
  </section>

  <!-- Category Trends -->
  <section id="cat-trends"></section>

  <!-- Likability Index -->
  <section id="likability"></section>

  <!-- A/B Stats -->
  <section id="ab-stats"></section>

  <!-- Fail Histogram -->
  <section id="fail-hist"></section>

  <!-- Queue -->
  <section id="queue"></section>

  <!-- Failed -->
  <section id="failed"></section>

</main>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let PUB = [], QUEUE = [], STATUS = {}, HISTORY = [], FAILED = []
let hourChart = null, histChart = null
let filt = 'All', sort = 'date', search = ''

const CAT_COLOR = {
  Animals:'#f97316', Space:'#8b5cf6', 'Human Body':'#ec4899',
  Science:'#3b82f6', History:'#f59e0b', Psychology:'#10b981',
  Nature:'#84cc16', Technology:'#06b6d4', Other:'#ef4444',
}
const CAT_ORDER = ['Animals','Space','Human Body','Science','History','Psychology','Nature','Technology','Other']

function col(cat) { return CAT_COLOR[cat] || '#ef4444' }

function fmt(n) {
  n = n || 0
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M'
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K'
  return String(Math.round(n))
}

function ago(iso) {
  if (!iso) return '—'
  const s = Math.floor((Date.now() - new Date(iso)) / 1000)
  if (s < 60) return s+'s atrás'
  if (s < 3600) return Math.floor(s/60)+'m atrás'
  return Math.floor(s/3600)+'h atrás'
}

function until(iso) {
  if (!iso) return '—'
  const s = Math.floor((new Date(iso) - Date.now()) / 1000)
  if (s <= 0) return 'agora'
  if (s < 60) return s+'s'
  if (s < 3600) return Math.floor(s/60)+'m'
  return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m'
}

// ── Header ─────────────────────────────────────────────────────────────────────
function renderHdr() {
  const views = PUB.reduce((s,v)=>s+(v.views||0),0)
  const likes  = PUB.reduce((s,v)=>s+(v.likes||0),0)
  const subs   = STATUS.subscribers || 0
  let trendViews = '', trendSubs = ''
  if (HISTORY.length >= 2) {
    const today = HISTORY[HISTORY.length-1], yest = HISTORY[HISTORY.length-2]
    if (yest.views > 0) {
      const pct = Math.round((today.views - yest.views) / yest.views * 100)
      trendViews = pct >= 0
        ? ` <span style="color:#4ade80;font-size:11px">↑${pct}%</span>`
        : ` <span style="color:#f87171;font-size:11px">↓${Math.abs(pct)}%</span>`
    }
    if (yest.subs > 0) {
      const diff = (today.subs||0) - (yest.subs||0)
      if (diff !== 0) trendSubs = diff > 0
        ? ` <span style="color:#4ade80;font-size:11px">+${diff}</span>`
        : ` <span style="color:#f87171;font-size:11px">${diff}</span>`
    }
  }
  const growth7d = HISTORY.length >= 2 ? (HISTORY[HISTORY.length-1].subs_growth_7d || null) : null
  const growth7dHtml = growth7d != null
    ? ` <span style="font-size:10px;color:${growth7d>=0?'#4ade80':'#f87171'}">(${growth7d>=0?'+':''}${growth7d} 7d)</span>`
    : ''
  document.getElementById('hdr').innerHTML =
    `<span><b class="text-white">${PUB.length}</b> publicados</span>` +
    `<span><b class="text-white">${fmt(views)}</b> views${trendViews}</span>` +
    `<span><b class="text-white">${likes}</b> likes</span>` +
    `<span><b class="text-white">${subs}</b> subs${trendSubs}${growth7dHtml}</span>` +
    `<span><b class="text-white">${QUEUE.length}</b> em fila</span>`
}

// ── Status Bar ─────────────────────────────────────────────────────────────────
function renderStatus() {
  const s = STATUS, qb = s.queue_breakdown || {}
  const online = s.mpt_online
  const subs = s.subscribers || 0
  const chViews = s.channel_views || 0
  document.getElementById('status').innerHTML = `
    <div>
      <p class="text-xs text-gray-500 mb-1">Motor</p>
      <div class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full shrink-0" style="background:${online?'#4ade80':'#ef4444'}"></span>
        <span class="text-gray-200">${online?'Online':'Offline'}</span>
      </div>
      <p class="text-xs text-gray-500 mt-0.5">último ciclo ${ago(s.last_run_at)}</p>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Próximo upload</p>
      <p class="text-gray-200 font-mono text-sm">${until(s.next_upload_at)}</p>
      <p class="text-xs text-gray-500 mt-0.5">hoje: ${s.uploads_today??0} · 24h: <span class="text-green-400 font-bold">${s.uploads_24h??0}</span></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Apagados</p>
      <p class="text-gray-200 font-mono text-lg font-bold">${s.deleted_total??0}</p>
      <p class="text-xs text-gray-500 mt-0.5">24h: <span class="${(s.deleted_24h??0)>0?'text-red-400 font-bold':'text-gray-500'}">${s.deleted_24h??0}</span></p>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Buffer</p>
      <div class="flex gap-1.5 flex-wrap">
        <span class="text-xs px-2 py-0.5 rounded-full" style="background:#1e3a5f;color:#93c5fd">📝 ${qb.script_ready??0}</span>
        <span class="text-xs px-2 py-0.5 rounded-full" style="background:#3b1f00;color:#fcd34d">⚙️ ${qb.generating??0}</span>
        <span class="text-xs px-2 py-0.5 rounded-full" style="background:#052e16;color:#86efac">✅ ${qb.ready_to_upload??0}</span>
      </div>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Subscribers</p>
      <p class="text-gray-200 font-mono text-lg font-bold">${subs.toLocaleString()}</p>
      <p class="text-xs text-gray-500 mt-0.5">${Math.round(subs/1000*100)}% meta 1k</p>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Receita est.</p>
      <p class="text-gray-200 font-mono text-sm">$${(PUB.reduce((a,v)=>a+(v.views||0),0)/1000).toFixed(2)}</p>
      <p class="text-xs text-gray-500 mt-0.5">@ $1 RPM</p>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Melhores horas</p>
      <p class="text-gray-200 font-mono text-sm">${(s.best_hours||[]).map(h=>h+'h').join(' ') || '—'}</p>
      <p class="text-xs text-gray-500 mt-0.5">avg views (UTC)</p>
    </div>
    <div>
      <p class="text-xs text-gray-500 mb-1">Script / Latência</p>
      <p class="text-gray-200 font-mono text-sm">${s.avg_word_count||'—'} words</p>
      <p class="text-xs text-gray-500 mt-0.5">latência: ${s.avg_latency_min||'—'} min</p>
    </div>`
}

// ── Monetização ────────────────────────────────────────────────────────────────
function renderMonetization() {
  const subs     = STATUS.subscribers || 0
  const totalViews = PUB.reduce((s,v)=>s+(v.views||0),0)
  const SUB_GOAL  = 1000
  const VIEW_GOAL = 10_000_000

  const subsPct  = Math.min(100, subs / SUB_GOAL * 100)
  const viewsPct = Math.min(100, totalViews / VIEW_GOAL * 100)

  const milestones = [100, 500, 1000]
  const topReached = [...milestones].reverse().find(m => subs >= m)
  const nextMs = milestones.find(m => subs < m)
  const msBanner = topReached ? `
    <div style="background:linear-gradient(90deg,#f59e0b18,#ef444418);border:1px solid #f59e0b33;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">🎉</span>
      <div>
        <p style="font-size:14px;font-weight:700;color:#f59e0b">${topReached.toLocaleString()} subscribers atingidos!</p>
        ${nextMs ? `<p style="font-size:12px;color:#6b7280">Próximo marco: ${nextMs.toLocaleString()} — faltam ${(nextMs-subs).toLocaleString()}</p>` : '<p style="font-size:12px;color:#4ade80">Monetização desbloqueada! 🚀</p>'}
      </div>
    </div>` : ''
  document.getElementById('monetization').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">💰 Progresso para Monetização (YouTube Shorts)</h2>
    ${msBanner}
    <div class="rounded-xl p-5 grid grid-cols-1 sm:grid-cols-2 gap-6" style="background:#111827">
      <div>
        <div class="flex justify-between text-sm mb-1">
          <span class="text-gray-400">Subscribers</span>
          <span class="font-mono text-white">${subs.toLocaleString()} / ${SUB_GOAL.toLocaleString()}</span>
        </div>
        <div style="background:#1f2937;border-radius:9999px;height:10px;overflow:hidden">
          <div style="background:linear-gradient(90deg,#f59e0b,#ef4444);height:100%;width:${subsPct.toFixed(1)}%;border-radius:9999px;transition:width .5s"></div>
        </div>
        <p class="text-xs text-gray-600 mt-1">${subsPct.toFixed(1)}% — faltam ${Math.max(0,SUB_GOAL-subs).toLocaleString()} subs</p>
      </div>
      <div>
        <div class="flex justify-between text-sm mb-1">
          <span class="text-gray-400">Shorts Views (90 dias)</span>
          <span class="font-mono text-white">${fmt(totalViews)} / 10M</span>
        </div>
        <div style="background:#1f2937;border-radius:9999px;height:10px;overflow:hidden">
          <div style="background:linear-gradient(90deg,#3b82f6,#8b5cf6);height:100%;width:${viewsPct.toFixed(1)}%;border-radius:9999px;transition:width .5s"></div>
        </div>
        <p class="text-xs text-gray-600 mt-1">${viewsPct.toFixed(2)}% — faltam ${fmt(Math.max(0,VIEW_GOAL-totalViews))} views</p>
      </div>
    </div>`
}

// ── Published ──────────────────────────────────────────────────────────────────
function renderPublished() {
  const catCounts = {}
  PUB.forEach(v => { const c=v.category||'Other'; catCounts[c]=(catCounts[c]||0)+1 })
  const cats = ['All', ...Object.keys(catCounts).sort()]

  const q = search.toLowerCase()
  const filtered = PUB.filter(v=>{
    const matchCat = filt==='All' || (v.category||'Other')===filt
    const matchSearch = !q || (v.title||'').toLowerCase().includes(q)
    return matchCat && matchSearch
  })
  const sorted = [...filtered].sort((a,b)=>{
    if (sort==='date') return new Date(b.uploaded_at)-new Date(a.uploaded_at)
    return (b[sort]||0)-(a[sort]||0)
  })

  const catBtns = cats.map(c=>{
    const n = c==='All' ? PUB.length : catCounts[c]
    const on = c===filt
    return `<button type="button" onclick="setFilt('${c}')" style="font-size:12px;font-weight:600;padding:6px 14px;border-radius:9999px;border:none;cursor:pointer;background:${on?'#dc2626':'#1f2937'};color:${on?'white':'#d1d5db'}">${c} <span style="opacity:.6">(${n})</span></button>`
  }).join('')

  const sortBtns = [['date','Recente'],['views','Views'],['likes','Likes'],['comments','Comentários']].map(([k,l])=>{
    const on = k===sort
    return `<button type="button" onclick="setSort('${k}')" style="font-size:12px;padding:4px 12px;border-radius:9999px;border:none;cursor:pointer;background:${on?'#4b5563':'#1f2937'};color:${on?'white':'#9ca3af'}">${l}</button>`
  }).join('')

  const cards = sorted.map(v=>{
    const cat = v.category||'Other'
    const c = col(cat)
    const lr = v.like_rate || 0
    const lrColor = lr >= 5 ? '#4ade80' : lr >= 2 ? '#fcd34d' : '#9ca3af'
    return `<a href="${v.url||('#')}" target="_blank" rel="noopener noreferrer" style="display:block;text-decoration:none;background:#111827;border-radius:12px;overflow:hidden">
      <div style="position:relative">
        <img src="${v.thumbnail||''}" alt="" style="width:100%;height:144px;object-fit:cover">
        <span style="position:absolute;top:8px;left:8px;background:${c}cc;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px">${cat}</span>
        <span style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:white;font-size:12px;padding:2px 8px;border-radius:9999px;font-weight:700">👁 ${fmt(v.views)}</span>
        ${v.title_variant==='b'?`<span style="position:absolute;bottom:8px;right:8px;background:rgba(139,92,246,.85);color:white;font-size:10px;padding:1px 6px;border-radius:9999px">B</span>`:''}
      </div>
      <div style="padding:12px">
        <p style="font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:white">${v.title||''}</p>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <span style="font-size:11px;background:#1e3a5f;color:#93c5fd;padding:2px 8px;border-radius:9999px">👁 ${fmt(v.views)}</span>
          <span style="font-size:11px;background:#052e16;color:#86efac;padding:2px 8px;border-radius:9999px">👍 ${v.likes||0}</span>
          <span style="font-size:11px;background:#3b1f00;color:#fcd34d;padding:2px 8px;border-radius:9999px">💬 ${v.comments||0}</span>
          ${lr>0?`<span style="font-size:11px;background:#1c1917;color:${lrColor};padding:2px 8px;border-radius:9999px">${lr}% like</span>`:''}
          ${v.views_24h>0?`<span style="font-size:11px;background:#1e1b4b;color:#a5b4fc;padding:2px 8px;border-radius:9999px">🚀 24h: ${fmt(v.views_24h)}</span>`:''}
          ${v.views_1h>0?`<span style="font-size:11px;background:#14532d;color:#86efac;padding:2px 8px;border-radius:9999px">⚡ 1h: ${fmt(v.views_1h)}</span>`:''}
        </div>
      </div>
    </a>`
  }).join('')

  document.getElementById('published').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">🎬 Published — ${PUB.length} videos</h2>
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px">
      <div style="display:flex;flex-wrap:wrap;gap:8px">${catBtns}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span style="font-size:12px;color:#6b7280">Ordenar:</span>${sortBtns}
      </div>
    </div>
    <div style="margin-bottom:12px">
      <input type="text" placeholder="🔍 Pesquisar vídeos…" oninput="setSearch(this.value)" value="${search}"
        style="width:100%;padding:8px 14px;border-radius:9999px;background:#1f2937;border:1px solid #374151;color:white;font-size:13px;outline:none">
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px">${cards || '<p style="color:#6b7280;text-align:center;padding:24px">Nenhum vídeo encontrado</p>'}</div>`
}

function setFilt(c) { filt=c; renderPublished() }
function setSort(k) { sort=k; renderPublished() }
function setSearch(v) { search=v; renderPublished() }

// ── Top 5 Global ───────────────────────────────────────────────────────────────
function renderTop3() {
  const top5 = STATUS.top5 || []
  const medals = ['🥇','🥈','🥉','4','5']

  const globalSection = top5.length ? `
    <div style="margin-bottom:24px">
      <p style="font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.05em;margin-bottom:8px">🌍 GLOBAL TOP 5</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${top5.map((v,i)=>`
          <a href="${v.url}" target="_blank" rel="noopener noreferrer"
             style="display:flex;align-items:center;gap:12px;padding:12px;background:#1f2937;border-radius:12px;text-decoration:none;color:inherit">
            <span style="font-size:18px;width:28px;text-align:center">${medals[i]||i+1}</span>
            <div style="flex:1;min-width:0">
              <p style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title}</p>
              <div style="display:flex;gap:12px;margin-top:3px">
                <span style="font-size:11px;color:#ef4444">👁 ${fmt(v.views)}</span>
                <span style="font-size:11px;color:#4ade80">👍 ${fmt(v.likes)}</span>
                <span style="font-size:11px;color:#f59e0b">♥ ${v.like_rate}%</span>
              </div>
            </div>
          </a>`).join('')}
      </div>
    </div>` : ''

  // Top 3 by category
  const byCat = {}
  PUB.forEach(v=>{ const c=v.category||'Other'; (byCat[c]=byCat[c]||[]).push(v) })
  const sections = CAT_ORDER.filter(c=>byCat[c]?.length).map(cat=>{
    const top = [...byCat[cat]].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,3)
    const items = top.map((v,i)=>`
      <a href="${v.url||'#'}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:12px;padding:10px;background:#1f2937;border-radius:12px;text-decoration:none;color:inherit">
        <span style="font-size:18px;font-weight:700;color:#6b7280;width:24px;text-align:center">${i+1}</span>
        <img src="${v.thumbnail||''}" style="width:48px;height:48px;border-radius:8px;object-fit:cover">
        <div style="flex:1;min-width:0">
          <p style="font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title||''}</p>
          <div style="display:flex;gap:8px;margin-top:2px">
            <span style="font-size:11px;color:#ef4444">👁 ${fmt(v.views)}</span>
            <span style="font-size:11px;color:#f59e0b">♥ ${v.like_rate||0}%</span>
          </div>
        </div>
      </a>`).join('')
    return `<div>
      <p style="font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.05em;margin-bottom:8px">${cat.toUpperCase()}</p>
      <div style="display:flex;flex-direction:column;gap:8px">${items}</div>
    </div>`
  }).join('')

  document.getElementById('top3').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">🏆 Top Vídeos</h2>
    <div style="background:#111827;border-radius:16px;padding:20px">
      ${globalSection}
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px">${sections}</div>
    </div>`
}

// ── Best Hour Chart ────────────────────────────────────────────────────────────
function renderHour() {
  const canvas = document.getElementById('hour-chart')
  const ph = document.getElementById('hour-ph')

  if (PUB.length < 5) {
    canvas.style.display='none'; ph.textContent=`Precisa de pelo menos 5 vídeos (atual: ${PUB.length})`; return
  }
  ph.textContent=''; canvas.style.display=''

  const hm = {}
  PUB.forEach(v=>{ if(!v.uploaded_at)return; const h=new Date(v.uploaded_at).getUTCHours(); hm[h]=(hm[h]||{sum:0,n:0}); hm[h].sum+=(v.views||0); hm[h].n++ })
  const data = Object.entries(hm).map(([h,d])=>({h:+h,lbl:`${String(h).padStart(2,'0')}h`,avg:Math.round(d.sum/d.n)})).sort((a,b)=>a.h-b.h)
  const maxAvg = Math.max(...data.map(d=>d.avg))
  const best = data.find(d=>d.avg===maxAvg)

  document.getElementById('hour-badge').innerHTML = best
    ? `<p style="font-size:11px;color:#6b7280">melhor hora</p><p style="font-size:18px;font-weight:700;color:#f59e0b">${best.lbl}</p><p style="font-size:11px;color:#6b7280">${fmt(best.avg)} avg</p>`
    : ''

  if (hourChart) { hourChart.destroy(); hourChart=null }
  hourChart = new Chart(canvas, {
    type:'bar',
    data:{
      labels:data.map(d=>d.lbl),
      datasets:[{data:data.map(d=>d.avg),backgroundColor:data.map(d=>d.avg===maxAvg?'#f59e0b':'rgba(59,130,246,.7)'),borderRadius:4}]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} views avg`}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#6b7280',font:{size:10}}},
        y:{grid:{color:'#1f2937'},ticks:{color:'#6b7280',font:{size:10},callback:fmt}}
      }
    }
  })
}

// ── History Chart (views + subs) ───────────────────────────────────────────────
function renderHist() {
  const canvas = document.getElementById('hist-chart')
  const ph = document.getElementById('hist-ph')

  if (HISTORY.length < 2) {
    canvas.style.display='none'; ph.textContent='Aguardando dados (mínimo 2 dias)…'; return
  }
  ph.textContent=''; canvas.style.display=''

  const hasSubs = HISTORY.some(e=>e.subs>0)
  if (histChart) { histChart.destroy(); histChart=null }
  histChart = new Chart(canvas, {
    type:'line',
    data:{
      labels:HISTORY.map(e=>e.date.slice(5)),
      datasets:[
        {label:'Views',data:HISTORY.map(e=>e.views),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',tension:.4,fill:true,pointRadius:3,pointBackgroundColor:'#3b82f6',yAxisID:'y'},
        ...(hasSubs ? [{label:'Subs',data:HISTORY.map(e=>e.subs||0),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.05)',tension:.4,fill:false,pointRadius:3,pointBackgroundColor:'#f59e0b',yAxisID:'y2'}] : [])
      ]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:hasSubs,labels:{color:'#9ca3af',font:{size:11}}},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#6b7280',font:{size:10}}},
        y:{grid:{color:'#1f2937'},ticks:{color:'#6b7280',font:{size:10},callback:fmt},position:'left'},
        ...(hasSubs ? {y2:{grid:{display:false},ticks:{color:'#f59e0b',font:{size:10}},position:'right'}} : {})
      }
    }
  })
}

// ── Category Trends ────────────────────────────────────────────────────────────
function renderCatTrends() {
  const ct = STATUS.category_trends || {}
  const cats = Object.keys(ct)
  if (!cats.length) { document.getElementById('cat-trends').innerHTML=''; return }
  const rows = cats.sort((a,b)=>(ct[b].avg_views||0)-(ct[a].avg_views||0)).map(cat=>{
    const d = ct[cat]
    const c = col(cat)
    const trend = d.trend_pct
    const tColor = trend > 10 ? '#4ade80' : trend < -10 ? '#f87171' : '#fcd34d'
    const tArrow = trend > 10 ? '↑' : trend < -10 ? '↓' : '→'
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:#1f2937;border-radius:10px">
      <span style="font-size:11px;font-weight:700;color:${c};width:90px;flex-shrink:0">${cat}</span>
      <span style="font-size:12px;color:#9ca3af;width:28px;flex-shrink:0">${d.n}v</span>
      <div style="flex:1;background:#374151;border-radius:9999px;height:6px;overflow:hidden">
        <div style="background:${c};height:100%;width:${Math.min(100,(d.avg_views||0)/20)}%;border-radius:9999px"></div>
      </div>
      <span style="font-size:12px;font-family:monospace;color:white;width:60px;text-align:right">${fmt(d.avg_views)}</span>
      <span style="font-size:12px;font-weight:700;color:${tColor};width:52px;text-align:right">${tArrow}${Math.abs(trend)}%</span>
    </div>`
  }).join('')
  document.getElementById('cat-trends').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">📊 Tendências por Categoria (7 dias)</h2>
    <div style="background:#111827;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px">${rows}</div>`
}

// ── Likability Index ────────────────────────────────────────────────────────────
function renderLikability() {
  const top = STATUS.likability_top || []
  if (!top.length) { document.getElementById('likability').innerHTML=''; return }
  const rows = top.map((v,i)=>`
    <a href="${v.url}" target="_blank" rel="noopener noreferrer"
       style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1f2937;border-radius:10px;text-decoration:none;color:inherit">
      <span style="font-size:14px;width:24px;text-align:center;color:#6b7280">${i+1}</span>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title}</span>
      <span style="font-size:11px;color:#86efac;font-family:monospace;white-space:nowrap">♥${v.like_rate}%</span>
      <span style="font-size:11px;color:#93c5fd;font-family:monospace;white-space:nowrap">💬${v.comment_rate}%</span>
      <span style="font-size:11px;color:#fcd34d;font-family:monospace;white-space:nowrap">👁${fmt(v.views)}</span>
    </a>`).join('')
  document.getElementById('likability').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">❤️ Índice de Likability (like+comment rate)</h2>
    <div style="background:#111827;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:8px">${rows}</div>`
}

// ── Fail Histogram ─────────────────────────────────────────────────────────────
function renderFailHist() {
  const fh = STATUS.fail_histogram || {}
  const keys = Object.keys(fh)
  if (!keys.length) { document.getElementById('fail-hist').innerHTML=''; return }
  const max = Math.max(...Object.values(fh))
  const rows = keys.map(r=>`
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:12px;color:#9ca3af;width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r}</span>
      <div style="flex:1;background:#1f2937;border-radius:9999px;height:6px;overflow:hidden">
        <div style="background:#ef4444;height:100%;width:${Math.round(fh[r]/max*100)}%;border-radius:9999px"></div>
      </div>
      <span style="font-size:12px;color:#f87171;font-family:monospace;width:24px;text-align:right">${fh[r]}</span>
    </div>`).join('')
  document.getElementById('fail-hist').innerHTML = `
    <h2 class="text-lg font-semibold mb-3" style="color:#f87171">🔴 Causas de Falha</h2>
    <div style="background:#111827;border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:10px">${rows}</div>`
}

// ── A/B Stats ─────────────────────────────────────────────────────────────────
function renderAbStats() {
  const ab = STATUS.ab_stats || {}
  const a = ab['a'] || {avg:0,n:0}
  const b = ab['b'] || {avg:0,n:0}
  if (!a.n && !b.n) {
    document.getElementById('ab-stats').innerHTML = ''; return
  }
  const winner = a.avg >= b.avg ? 'A' : 'B'
  const maxAvg = Math.max(a.avg, b.avg) || 1

  // Format stats per category
  const fmtStats = STATUS.format_stats || {}
  const fmtCats = Object.keys(fmtStats)
  const fmtSection = fmtCats.length ? `
    <h3 style="font-size:13px;font-weight:600;color:#6b7280;margin:20px 0 12px">Melhor Formato por Categoria</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
      ${fmtCats.map(cat => {
        const rows = fmtStats[cat]
        const top = rows[0]
        const c = col(cat)
        return `<div style="background:#1f2937;border-radius:10px;padding:12px">
          <p style="font-size:11px;font-weight:700;color:${c};margin-bottom:8px">${cat.toUpperCase()}</p>
          ${rows.map((r,i) => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span style="font-size:11px;color:${i===0?'#f59e0b':'#6b7280'};width:16px">${i===0?'🥇':'·'}</span>
              <span style="font-size:12px;color:${i===0?'white':'#9ca3af'};flex:1">${r.format}</span>
              <span style="font-size:11px;font-family:monospace;color:${i===0?'#4ade80':'#6b7280'}">${fmt(r.avg)}</span>
            </div>`).join('')}
        </div>`
      }).join('')}
    </div>` : ''

  document.getElementById('ab-stats').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">🔬 A/B Test de Títulos</h2>
    <div class="rounded-xl p-5" style="background:#111827">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <div class="flex justify-between text-sm mb-2">
            <span class="font-semibold" style="color:${winner==='A'?'#4ade80':'#9ca3af'}">Variante A ${winner==='A'?'🏆':''}</span>
            <span class="font-mono text-white">${fmt(a.avg)} avg · ${a.n} vídeos</span>
          </div>
          <div style="background:#1f2937;border-radius:9999px;height:10px;overflow:hidden">
            <div style="background:#3b82f6;height:100%;width:${(a.avg/maxAvg*100).toFixed(1)}%;border-radius:9999px"></div>
          </div>
          <p class="text-xs text-gray-600 mt-1">Formato original (yt_title)</p>
        </div>
        <div>
          <div class="flex justify-between text-sm mb-2">
            <span class="font-semibold" style="color:${winner==='B'?'#4ade80':'#9ca3af'}">Variante B ${winner==='B'?'🏆':''}</span>
            <span class="font-mono text-white">${fmt(b.avg)} avg · ${b.n} vídeos</span>
          </div>
          <div style="background:#1f2937;border-radius:9999px;height:10px;overflow:hidden">
            <div style="background:#8b5cf6;height:100%;width:${(b.avg/maxAvg*100).toFixed(1)}%;border-radius:9999px"></div>
          </div>
          <p class="text-xs text-gray-600 mt-1">Formato alternativo (yt_title_b)</p>
        </div>
      </div>
      ${fmtSection}
    </div>`
}

// ── Queue ──────────────────────────────────────────────────────────────────────
function renderQueue() {
  const rows = QUEUE.map(v=>{
    const cat=v.category||'Other', c=col(cat)
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;background:#111827">
      <span class="q-dot" style="width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0"></span>
      <span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:9999px;background:${c}22;color:${c};flex-shrink:0">${cat}</span>
      <span style="flex:1;font-size:14px;color:#d1d5db;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.yt_title||''}</span>
      <span class="q-status" style="font-size:12px;font-weight:600;color:#4ade80;background:#052e16;padding:2px 8px;border-radius:9999px;flex-shrink:0">pronto</span>
      <span class="q-date" style="font-size:12px;color:#6b7280;font-family:monospace;flex-shrink:0">${v.scheduled_at||''}</span>
    </div>`
  }).join('')

  document.getElementById('queue').innerHTML = `
    <h2 class="text-lg font-semibold mb-3 text-gray-300">📋 Fila de Upload — ${QUEUE.length} vídeos</h2>
    ${QUEUE.length===0
      ? `<div class="rounded-xl p-6 text-center text-sm text-gray-600" style="background:#111827">A sincronizar com o engine… (atualiza em até 2 min)</div>`
      : `<div style="display:flex;flex-direction:column;gap:8px">${rows}</div>`}`
}

// ── Failed ─────────────────────────────────────────────────────────────────────
function renderFailed() {
  if (!FAILED.length) { document.getElementById('failed').innerHTML=''; return }
  const rows = FAILED.map(v=>{
    const cat=v.category||'Other', c=col(cat)
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;background:#111827">
      <span style="font-size:12px;font-weight:600;padding:2px 8px;border-radius:9999px;background:${c}22;color:${c};flex-shrink:0">${cat}</span>
      <span style="flex:1;font-size:14px;color:#d1d5db;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title||''}</span>
      <span style="font-size:12px;color:#f87171;flex-shrink:0">tentativa ${v.retry_count||0}/3</span>
    </div>`
  }).join('')
  document.getElementById('failed').innerHTML = `
    <h2 class="text-lg font-semibold mb-3" style="color:#f87171">⚠️ Vídeos Falhados — ${FAILED.length}</h2>
    <div style="display:flex;flex-direction:column;gap:8px">${rows}</div>`
}

// ── Fetch & Bootstrap ──────────────────────────────────────────────────────────
async function fetchAll() {
  const t = '?t='+Date.now()
  ;[PUB,QUEUE,STATUS,HISTORY,FAILED] = await Promise.all([
    fetch('public/published_snapshot.json'+t).then(r=>r.json()).catch(()=>[]),
    fetch('public/queue_snapshot.json'+t).then(r=>r.json()).catch(()=>[]),
    fetch('public/status_snapshot.json'+t).then(r=>r.json()).catch(()=>({})),
    fetch('public/stats_history.json'+t).then(r=>r.json()).catch(()=>[]),
    fetch('public/failed_snapshot.json'+t).then(r=>r.json()).catch(()=>[]),
  ])
  renderAll()
}

function renderAll() {
  renderHdr(); renderStatus(); renderMonetization()
  renderPublished(); renderTop3(); renderHour()
  renderHist(); renderCatTrends(); renderLikability()
  renderAbStats(); renderFailHist(); renderQueue(); renderFailed()
}

fetchAll()
setInterval(fetchAll, 120_000)
setInterval(()=>{ renderHdr(); renderStatus() }, 30_000)
</script>
</body>
</html>
